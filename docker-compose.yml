services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo123}
      POSTGRES_DB: ${POSTGRES_DB:-tododb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-todo}:${POSTGRES_PASSWORD:-todo123}@postgres:5432/${POSTGRES_DB:-tododb}
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=todo
      - POSTGRES_PASSWORD=todo123
      - POSTGRES_DB=tododb
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data: